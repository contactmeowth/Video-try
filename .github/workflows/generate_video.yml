name: 🎬 AI Video Pipeline (Auto-Pilot)

on:
  push:
    paths:
      - 'topic.txt'       # Now triggers when you change your topic!
  workflow_dispatch:      # Manual run button

jobs:
  generate-video:
    runs-on: ubuntu-latest
    timeout-minutes: 90   # Increased timeout for longer videos

    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4

      - name: 🐍 Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: 🔧 Install FFmpeg & fonts
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y ffmpeg fonts-dejavu-core fonts-liberation --no-install-recommends

      - name: 📦 Install Python dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install google-genai


      - name: 🎬 Run Master AI Engine
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          python master_process.py

      - name: 📤 Upload video artifact
        uses: actions/upload-artifact@v4
        with:
          name: generated-recap-video
          path: output/*.mp4
          retention-days: 14

      - name: 📱 Telegram notification
        if: always()
        env:
          TG_TOKEN:  ${{ secrets.TG_TOKEN }}
          USER_ID:   ${{ secrets.USER_ID }}
        run: |
          STATUS="${{ job.status }}"
          RUN_URL="https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          
          if [ "$STATUS" = "success" ]; then
            MSG="✅ 🎬 Video Pipeline SUCCESS!%0ARun: ${RUN_URL}"
          else
            MSG="❌ Video generation FAILED%0ARun: ${RUN_URL}"
          fi
          
          curl -s -X POST "https://api.telegram.org/bot${TG_TOKEN}/sendMessage" \
            -d chat_id="${USER_ID}" -d text="${MSG}" -d parse_mode="HTML" || true
